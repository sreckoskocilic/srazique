name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup fixtures
        env:
          FIXTURES_PAT: ${{ secrets.FIXTURES_PAT }}
        run: |
          if [ -n "$FIXTURES_PAT" ]; then
            git config --global url."https://${FIXTURES_PAT}@github.com/".insteadOf "https://github.com/"
            git submodule update --init --recursive
          else
            npm run fixture:stub
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
