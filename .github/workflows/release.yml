name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release-mac:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.FIXTURES_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Update fixtures submodule
        run: git submodule update --remote tests/fixtures

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac -- --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  release-win:
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.FIXTURES_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Update fixtures submodule
        run: git submodule update --remote tests/fixtures

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win -- --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: dist/*.exe

  publish:
    needs: [release-mac, release-win]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
