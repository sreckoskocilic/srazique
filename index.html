<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Srazique</title>
  <style>
    :root {
      --board-cols: 8;
      --board-rows: 8;
    }
    .board { display: grid; grid-template-columns: repeat(var(--board-cols), 1fr); }
    .cat-art { background: #E53935; }
    .cat-geography { background: #1E88E5; }
    .cat-history { background: #43A047; }
    @keyframes pulse { 0% { opacity: 1; } 100% { opacity: 0.5; } }
    @keyframes timerPulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .timer-bar-container { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 8px 0; }
    .timer-bar-fill { height: 100%; border-radius: 4px; transition: width 0.1s linear, background-color 0.3s; }
    .timer-bar-fill.safe { background: #43A047; }
    .timer-bar-fill.warning { background: #FB8C00; }
    .timer-bar-fill.danger { background: #E53935; animation: timerPulse 0.5s infinite; }
    .timer-text { font-size: 1.2em; font-weight: bold; text-align: center; }
    .timer-text.warning { color: #FB8C00; }
    .timer-text.danger { color: #E53935; }
    .timer-setup-group { display: flex; gap: 8px; margin: 12px 0; }
    .timer-btn { padding: 8px 16px; border: 2px solid #555; border-radius: 6px; background: #222; color: #fff; cursor: pointer; font-size: 1em; }
    .timer-btn.selected { border-color: #1E88E5; background: #1565C0; }
    .timer-btn:hover { border-color: #90CAF9; }
    .nav-highlight { outline: 2px solid #FFD600; outline-offset: -2px; z-index: 5; }
    @media (max-width: 600px) { .board { grid-template-columns: repeat(4, 1fr); } }
  </style>
</head>
